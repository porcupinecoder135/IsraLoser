<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IsraMaster - אתגר גאוגרפיה יומי</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --primary: #1a2a6c;
            --accent: #f44336;
            --gold: #ffeb3b;
            --success: #2ecc71;
            --dark: #2c3e50;
            --sidebar-width: 400px;
        }

        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; background: #eee; }
        body { display: flex; flex-direction: row; }

        #sidebar { 
            width: var(--sidebar-width); height: 100vh; background: var(--dark); 
            box-shadow: 5px 0 15px rgba(0,0,0,0.2); padding: 30px; 
            box-sizing: border-box; z-index: 1001; overflow-y: auto; 
            display: flex; flex-direction: column; color: white;
            transition: transform 0.3s ease-out;
        }

        #map { flex: 1; height: 100vh; background: #cad7d0; z-index: 1; }

        /* CENTERED MOBILE UI */
        #mobile-toggle {
            display: none; position: fixed; bottom: 20px; right: 20px;
            z-index: 2005; background: var(--dark); color: white; border: 2px solid var(--accent);
            padding: 12px 20px; border-radius: 50px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .swipe-handle {
            display: none; width: 50px; height: 6px; background: rgba(255,255,255,0.3);
            border-radius: 10px; margin: -15px auto 15px auto; padding: 10px 0; background-clip: content-box;
        }

        /* BIGGER MAP LABELS */
        .custom-marker { display: flex !important; flex-direction: column !important; align-items: center !important; justify-content: center !important; }
        .marker-dot { width: 18px; height: 18px; border-radius: 50%; border: 3px solid white; box-shadow: 0 0 10px rgba(0,0,0,0.5); flex-shrink: 0; }
        .marker-label {
            background: white; color: black; padding: 4px 12px; border-radius: 8px;
            font-size: 16px; font-weight: 900; margin-top: 6px; white-space: nowrap;
            border: 2px solid var(--dark); box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        .marker-dist { font-size: 12px; color: var(--accent); display: block; text-align: center; }

        /* AUTOCORRECT SUGGESTION */
        #suggestion-box { 
            display: none; background: rgba(244, 67, 54, 0.2); border: 1px solid var(--accent);
            padding: 10px; border-radius: 10px; margin-top: 5px; font-size: 14px; text-align: center;
        }
        .sugg-link { text-decoration: underline; cursor: pointer; color: var(--gold); font-weight: bold; }

        #setup-overlay, #how-to-play-overlay, #victory-overlay { 
            position: fixed; inset: 0; z-index: 3000; display: flex; 
            flex-direction: column; justify-content: center; align-items: center; 
            color: white; text-align: center; backdrop-filter: blur(5px);
        }
        #setup-overlay { background: radial-gradient(circle at center, #1a2a6c, #000); }
        #how-to-play-overlay { background: rgba(0,0,0,0.9); display: none; }
        
        .game-logo { font-size: clamp(40px, 10vw, 80px); font-weight: 900; letter-spacing: 8px; margin-bottom: 5px; color: white; }
        .stats-card { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); padding: 20px; border-radius: 20px; margin-bottom: 25px; text-align: center; }
        .life-container { display: flex; justify-content: center; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
        .life-circle { width: 14px; height: 14px; background: var(--gold); border-radius: 50%; box-shadow: 0 0 10px var(--gold); transition: 0.4s; }
        .life-circle.lost { background: rgba(255,255,255,0.1); box-shadow: none; transform: scale(0.7); }
        
        .btn-main { padding: 16px; background: var(--accent); color: white; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; font-size: 18px; width: 100%; margin-top: 10px; }
        .btn-secondary { background: transparent; border: 1px solid rgba(255,255,255,0.4); color: white; }
        
        input { 
            padding:18px; border-radius:15px; border:2px solid transparent; 
            background: white; color: black; font-size: 18px; width: 100%; 
            box-sizing: border-box; outline: none; text-align: center;
        }

        #feedback { margin-top: 20px; flex: 1; padding-bottom: 40px; }
        .guess-row { padding: 12px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; font-weight: 800; margin-bottom: 8px; color: #000; font-size: 16px; }
        
        .modal { background: white; padding: 30px; border-radius: 25px; width: 85%; max-width: 400px; color: #333; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 20px 0; }

        @media (max-width: 850px) {
            #sidebar { 
                position: fixed; bottom: 0; left: 0; width: 100%; height: 65vh; 
                transform: translateY(100%); border-radius: 30px 30px 0 0; 
                z-index: 2100; transition: transform 0.1s linear;
                padding: 20px;
            }
            #sidebar.open { transform: translateY(0); }
            .swipe-handle { display: block; }
            #mobile-toggle { display: block; }
            /* Centering the Input Panel on mobile */
            #input-panel {
                width: 90%;
                margin: 0 auto;
            }
        }
    </style>
</head>
<body>

<div id="setup-overlay">
    <div class="game-logo">ISRAMASTER</div>
    <p style="margin-bottom: 30px; font-size: 18px; opacity: 0.9;">האתגר הגיאוגרפי היומי של ישראל</p>
    <div style="display:flex; flex-direction:column; gap:10px; width: 260px;">
        <button class="btn-main" onclick="startGame()">התחילו אתגר 🛰️</button>
        <button class="btn-main btn-secondary" onclick="toggleInstructions(true)">איך משחקים? 📖</button>
    </div>
</div>

<div id="how-to-play-overlay">
    <div class="modal">
        <h2 style="margin-top:0">איך משחקים?</h2>
        <ul style="text-align: right; line-height: 1.6; padding-right: 20px;">
            <li>נחשו את <b>שם היישוב המסתורי</b>.</li>
            <li>בכל ניחוש תקבלו מרחק וכיוון ליעד.</li>
            <li>יש לכם 10 ניסיונות. בהצלחה!</li>
        </ul>
        <button class="btn-main" onclick="toggleInstructions(false)">הבנתי!</button>
    </div>
</div>

<button id="mobile-toggle" onclick="toggleSidebar(true)">רשימה 📊</button>

<div id="sidebar">
    <div class="swipe-handle" id="swipeHandle"></div>
    <div style="text-align: center; margin-bottom: 15px;">
        <h2 style="margin:0; font-size: 22px; letter-spacing: 2px;">ISRAMASTER</h2>
    </div>
    
    <div class="stats-card">
        <div class="life-container" id="lifePoints"></div>
    </div>

    <div id="input-panel">
        <input type="text" id="cityInput" placeholder="הקלד שם יישוב..." list="cityList" autocomplete="off" onkeypress="if(event.key === 'Enter') makeGuess()">
        <datalist id="cityList"></datalist>
        
        <div id="suggestion-box">
            האם התכוונת ל-<span id="suggestedName" class="sugg-link"></span>?
        </div>

        <button id="submitBtn" class="btn-main" onclick="makeGuess()">ניחוש 🚀</button>
        <button id="giveUpBtn" class="btn-main btn-secondary" onclick="giveUp()">ויתור 🏳️</button>
    </div>

    <div id="feedback"></div>
</div>

<div id="map"></div>

<div id="victory-overlay" style="display:none;">
    <div class="modal">
        <h2 id="vic-title"></h2>
        <p id="vic-msg" style="font-weight: bold; font-size: 20px;"></p>
        <div class="stats-grid">
            <div class="stat-item"><span class="stat-val" id="st-played">0</span><span class="stat-lbl">משחקים</span></div>
            <div class="stat-item"><span class="stat-val" id="st-winpct">0%</span><span class="stat-lbl">ניצחונות</span></div>
            <div class="stat-item"><span class="stat-val" id="st-streak">0</span><span class="stat-lbl">רצף</span></div>
            <div class="stat-item"><span class="stat-val" id="st-avg">0</span><span class="stat-lbl">ממוצע</span></div>
        </div>
        <button class="btn-main" style="background: var(--dark);" onclick="hideOverlay()">חזרה למפה 🗺️</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
let allCities = [];
let target;
let attempts = 10;
let isGameOver = false;

// --- LEVENSHTEIN DISTANCE FOR AUTOCORRECT ---
function getLevenshteinDistance(a, b) {
    const matrix = Array.from({ length: a.length + 1 }, (_, i) => [i]);
    for (let j = 0; j <= b.length; j++) matrix[0][j] = j;
    for (let i = 1; i <= a.length; i++) {
        for (let j = 1; j <= b.length; j++) {
            const cost = a[i - 1] === b[j - 1] ? 0 : 1;
            matrix[i][j] = Math.min(matrix[i - 1][j] + 1, matrix[i][j - 1] + 1, matrix[i - 1][j - 1] + cost);
        }
    }
    return matrix[a.length][b.length];
}

function findBestMatch(input) {
    if (!input) return null;
    let bestMatch = null;
    let minDistance = 3; // Allow up to 2 typos
    allCities.forEach(city => {
        let dist = getLevenshteinDistance(input, city.name);
        if (dist < minDistance) {
            minDistance = dist;
            bestMatch = city.name;
        }
    });
    return bestMatch;
}

// --- SWIPE LOGIC ---
let touchStartY = 0;
let currentTranslateY = 0;
const sidebar = document.getElementById('sidebar');

sidebar.addEventListener('touchstart', e => {
    if (sidebar.scrollTop <= 0) {
        touchStartY = e.touches[0].clientY;
        sidebar.classList.remove('transitioning');
    }
}, {passive: true});

sidebar.addEventListener('touchmove', e => {
    if (sidebar.scrollTop <= 0) {
        const touchY = e.touches[0].clientY;
        const diff = touchY - touchStartY;
        if (diff > 0 && sidebar.classList.contains('open')) {
            sidebar.style.transform = `translateY(${diff}px)`;
            currentTranslateY = diff;
        }
    }
}, {passive: true});

sidebar.addEventListener('touchend', () => {
    sidebar.classList.add('transitioning');
    if (currentTranslateY > 150) toggleSidebar(false);
    else sidebar.style.transform = '';
    currentTranslateY = 0;
});

// --- MAP & GAME LOGIC ---
const map = L.map('map', { zoomControl: false }).setView([31.5, 34.8], 8);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png').addTo(map);

async function loadData() {
    try {
        const response = await fetch('MapIsrael.geojson');
        const data = await response.json();
        allCities = data.features.map(f => ({
            name: (f.properties["name:he"] || f.properties["name"] || "").trim(),
            lat: f.geometry.coordinates[1],
            lon: f.geometry.coordinates[0]
        })).filter(c => c.name !== "");

        setupUI();
        setDailyTarget();
        restoreGameState();
    } catch (e) { console.error("Error loading data", e); }
}

function setupUI() {
    const container = document.getElementById('lifePoints');
    container.innerHTML = '';
    for(let i=0; i<10; i++) {
        const div = document.createElement('div');
        div.className = 'life-circle';
        div.id = `life-${i}`;
        container.appendChild(div);
    }
    const dl = document.getElementById('cityList');
    [...new Set(allCities.map(c => c.name))].sort().forEach(name => {
        let o = document.createElement('option'); o.value = name; dl.appendChild(o);
    });
}

function setDailyTarget() {
    const d = new Date();
    const seedStr = `v3-${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
    let hash = 0;
    for (let i = 0; i < seedStr.length; i++) hash = ((hash << 5) - hash) + seedStr.charCodeAt(i);
    const seededRandom = Math.abs(Math.sin(hash));
    target = allCities[Math.floor(seededRandom * allCities.length)];
}

function makeGuess() {
    const input = document.getElementById('cityInput');
    const suggBox = document.getElementById('suggestion-box');
    const val = input.value.trim();
    if (!val || isGameOver) return;

    let guess = allCities.find(c => c.name === val);
    
    if (!guess) {
        let best = findBestMatch(val);
        if (best) {
            suggBox.style.display = 'block';
            document.getElementById('suggestedName').innerText = best;
            document.getElementById('suggestedName').onclick = () => {
                input.value = best;
                suggBox.style.display = 'none';
                makeGuess();
            };
        }
        return;
    }

    suggBox.style.display = 'none';
    processGuess(val);
    input.value = "";
}

function processGuess(cityName, isRestoring = false) {
    let guess = allCities.find(c => c.name === cityName);
    if (!guess) return;

    attempts--;
    const lifeCircle = document.getElementById(`life-${attempts}`);
    if(lifeCircle) lifeCircle.classList.add('lost');

    const dist = calculateDistance(guess.lat, guess.lon, target.lat, target.lon);
    const bearing = (Math.atan2(target.lon - guess.lon, target.lat - guess.lat) * 180 / Math.PI + 360) % 360;
    const ratio = Math.pow(Math.min(dist / 150, 1), 0.35);
    const color = `rgb(255, ${Math.floor(255 * ratio)}, ${Math.floor(100 * ratio)})`;

    // BIGGER MARKER UI
    const icon = L.divIcon({
        className: 'custom-marker',
        html: `<div class="marker-dot" style="background-color:${color}"></div>
               <div class="marker-label">
                 ${guess.name}
                 <span class="marker-dist">${dist.toFixed(1)} ק"מ</span>
               </div>`,
        iconSize: [0, 0],
        iconAnchor: [0, 0]
    });
    L.marker([guess.lat, guess.lon], { icon: icon }).addTo(map);
    
    const row = document.createElement('div');
    row.className = 'guess-row';
    row.style.background = color;
    row.innerHTML = `<span>${guess.name}</span> <span>${dist.toFixed(1)} ק"מ <span style="display:inline-block; transform:rotate(${bearing}deg)">⬆️</span></span>`;
    document.getElementById('feedback').prepend(row);

    if (!isRestoring) {
        saveProgress(cityName);
        map.flyTo([guess.lat, guess.lon], 11);
        if (window.innerWidth <= 850) {
            setTimeout(() => toggleSidebar(false), 500);
        }
    }

    if (cityName === target.name) endGame(true, attempts, isRestoring);
    else if (attempts === 0) endGame(false, attempts, isRestoring);
}

// Utility functions
function calculateDistance(lat1, lon1, lat2, lon2) {
    const R = 6371;
    const dLat = (lat2-lat1)*Math.PI/180;
    const dLon = (lon2-lon1)*Math.PI/180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function endGame(win, remaining, alreadyProcessed = false) {
    isGameOver = true;
    document.getElementById('cityInput').disabled = true;
    document.getElementById('submitBtn').disabled = true;

    let stats = JSON.parse(localStorage.getItem('israeleStats')) || { played:0, wins:0, streak:0, totalGuesses:0 };
    
    if (!alreadyProcessed && stats.isGameOverToday !== true) {
        stats.played++;
        stats.isGameOverToday = true;
        stats.lastResultWasWin = win;
        stats.lastAttemptsCount = remaining;
        if(win) { stats.wins++; stats.streak++; stats.totalGuesses += (10 - remaining); }
        else { stats.streak = 0; }
        localStorage.setItem('israeleStats', JSON.stringify(stats));
    }
    
    document.getElementById('st-played').innerText = stats.played;
    document.getElementById('st-winpct').innerText = stats.played > 0 ? Math.round((stats.wins / stats.played) * 100) + "%" : "0%";
    document.getElementById('st-streak').innerText = stats.streak;
    document.getElementById('st-avg').innerText = stats.wins > 0 ? (stats.totalGuesses / stats.wins).toFixed(1) : "0";
    
    document.getElementById('victory-overlay').style.display = 'flex';
    document.getElementById('vic-title').innerText = win ? "פגיעה בול! 🎯" : "אולי מחר... 🚩";
    document.getElementById('vic-msg').innerText = `היעד היה: ${target.name}`;
    
    L.marker([target.lat, target.lon]).addTo(map).bindPopup(`<b>${target.name}</b>`).openPopup();
    if (!alreadyProcessed) map.flyTo([target.lat, target.lon], 12);
}

function saveProgress(cityName) {
    let stats = JSON.parse(localStorage.getItem('israeleStats')) || {};
    const today = `v3-${new Date().getFullYear()}-${new Date().getMonth()+1}-${new Date().getDate()}`;
    if (stats.lastPlayedDate !== today) { stats.lastPlayedDate = today; stats.guessesToday = []; stats.isGameOverToday = false; }
    stats.guessesToday.push(cityName);
    localStorage.setItem('israeleStats', JSON.stringify(stats));
}

function restoreGameState() {
    const stats = JSON.parse(localStorage.getItem('israeleStats')) || {};
    const today = `v3-${new Date().getFullYear()}-${new Date().getMonth()+1}-${new Date().getDate()}`;
    if (stats.lastPlayedDate === today && stats.guessesToday) {
        document.getElementById('setup-overlay').style.display = 'none';
        stats.guessesToday.forEach(cityName => processGuess(cityName, true));
        if (stats.isGameOverToday) endGame(stats.lastResultWasWin, stats.lastAttemptsCount, true);
    }
}

function startGame() { document.getElementById('setup-overlay').style.display = 'none'; }
function toggleInstructions(show) { document.getElementById('how-to-play-overlay').style.display = show ? 'flex' : 'none'; }
function toggleSidebar(forceOpen) {
    if (forceOpen === true) sidebar.classList.add('open');
    else if (forceOpen === false) sidebar.classList.remove('open');
    else sidebar.classList.toggle('open');
}
function hideOverlay() { document.getElementById('victory-overlay').style.display = 'none'; }
function giveUp() { if(!isGameOver) endGame(false, attempts); }
window.onload = loadData;
</script>
</body>
</html>
