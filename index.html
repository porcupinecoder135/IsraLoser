<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IsraMaster - אתגר גאוגרפי יומי</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --primary: #1a2a6c;
            --accent: #f44336;
            --gold: #ffeb3b;
            --success: #2ecc71;
            --dark: #2c3e50;
            --sidebar-width: 400px;
        }

        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; background: #eee; }
        body { display: flex; flex-direction: row; }

        #sidebar { 
            width: var(--sidebar-width); height: 100vh; background: var(--dark); 
            box-shadow: 5px 0 15px rgba(0,0,0,0.2); padding: 30px; 
            box-sizing: border-box; z-index: 1001; overflow-y: auto; 
            display: flex; flex-direction: column; color: white;
            transition: transform 0.3s ease-out;
        }

        #map { flex: 1; height: 100vh; background: #cad7d0; z-index: 1; }

        #mobile-toggle {
            display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(50%);
            z-index: 2005; background: var(--dark); color: white; border: 2px solid var(--accent);
            padding: 12px 35px; border-radius: 30px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* Improved Error/Suggestion UI */
        .error-container {
            height: 75px; 
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        #errorMsg { 
            width: 100%;
            min-height: 50px;
            color: #fff; 
            font-size: 14px;
            opacity: 0; 
            text-align: center; 
            font-weight: bold; 
            background: rgba(255, 255, 255, 0.05); /* Subtle placeholder */
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px; 
            border-radius: 12px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: translateY(10px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            pointer-events: none;
        }

        #errorMsg.visible { 
            opacity: 1; 
            transform: translateY(0);
            background: rgba(244, 67, 54, 0.35); 
            border-color: var(--accent);
            box-shadow: 0 4px 15px rgba(244, 67, 54, 0.2);
            pointer-events: auto;
        }

        #errorMsg.suggestion-active {
            background: rgba(46, 204, 113, 0.2);
            border-color: var(--success);
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.2);
        }

        .suggestion-link { 
            text-decoration: none; 
            color: var(--gold); 
            display: inline-block; 
            margin-top: 5px; 
            cursor: pointer;
            padding: 2px 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 5px;
        }

        /* Marker & Animation Styles */
        .custom-marker { display: flex !important; flex-direction: column !important; align-items: center !important; justify-content: center !important; background: none !important; border: none !important; }
        .marker-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 8px rgba(0,0,0,0.5); }
        .marker-label { background: rgba(0, 0, 0, 0.85); color: white; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; margin-top: 5px; white-space: nowrap; }
        .arrow-indicator { font-size: 18px; line-height: 1; margin-top: 2px; }

        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; border: 2px solid var(--accent) !important; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        /* Overlays */
        #setup-overlay, #how-to-play-overlay, #victory-overlay { position: fixed; inset: 0; z-index: 3000; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; backdrop-filter: blur(8px); }
        #setup-overlay { background: radial-gradient(circle at center, #1a2a6c, #000); }
        #how-to-play-overlay { background: rgba(0,0,0,0.85); display: none; }
        
        .game-logo { font-size: clamp(40px, 10vw, 80px); font-weight: 900; letter-spacing: 8px; margin-bottom: 5px; color: #fff; }
        .btn-main { padding: 16px; background: var(--accent); color: white; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; font-size: 18px; width: 100%; margin-top: 10px; }
        .btn-secondary { background: transparent; border: 1px solid rgba(255,255,255,0.4); color: white; }
        
        input { padding:18px; border: 2px solid transparent; border-radius:15px; background: rgba(255,255,255,0.15); font-size: 17px; color: white; width: 100%; box-sizing: border-box; outline: none; }
        .stats-card { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); padding: 20px; border-radius: 20px; margin-bottom: 25px; }
        .life-container { display: flex; justify-content: center; gap: 8px; margin-top: 10px; }
        .life-circle { width: 14px; height: 14px; background: var(--gold); border-radius: 50%; box-shadow: 0 0 10px var(--gold); transition: 0.4s; }
        .life-circle.lost { background: rgba(255,255,255,0.1); transform: scale(0.7); box-shadow: none; }
        
        #feedback { margin-top: 20px; flex: 1; overflow-y: auto; }
        .guess-row { padding: 12px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; font-weight: 800; margin-bottom: 8px; color: #000; font-size: 14px; }
        .modal { background: white; padding: 30px; border-radius: 25px; width: 85%; max-width: 400px; color: #333; }

        @media (max-width: 850px) {
            #sidebar { position: fixed; bottom: 0; left: 0; width: 100%; height: 60vh; transform: translateY(100%); border-radius: 30px 30px 0 0; z-index: 2100; }
            #sidebar.open { transform: translateY(0); }
            #mobile-toggle { display: block; }
        }
    </style>
</head>
<body>

<div id="setup-overlay">
    <div class="game-logo">ISRAMASTER</div>
    <p style="margin-bottom: 30px; font-size: 18px; opacity: 0.9;">האתגר הגיאוגרפי היומי של ישראל</p>
    <div style="width: 280px; display: flex; flex-direction: column; gap: 10px;">
        <button class="btn-main" onclick="startGame()">התחילו אתגר 🛰️</button>
        <button class="btn-main btn-secondary" onclick="toggleInstructions(true)">איך משחקים? 📖</button>
    </div>
</div>

<div id="how-to-play-overlay">
    <div class="modal">
        <h2 style="margin-top:0">איך משחקים?</h2>
        <ul style="text-align: right; line-height: 1.6; padding-right: 20px;">
            <li>נחשו את <b>היישוב המסתורי</b> של היום.</li>
            <li>בכל ניחוש תקבלו מרחק וכיוון ליעד.</li>
            <li>יש לכם 10 ניסיונות בלבד!</li>
        </ul>
        <button class="btn-main" onclick="toggleInstructions(false)">הבנתי!</button>
    </div>
</div>

<button id="mobile-toggle" onclick="toggleSidebar(true)">הקש ניחוש 📊</button>

<div id="sidebar">
    <div style="text-align: center; margin-bottom: 20px;">
        <h2 style="margin:0; font-size: 24px; letter-spacing: 2px;">ISRAMASTER</h2>
    </div>
    <div class="stats-card">
        <div style="font-size: 11px; opacity: 0.7; margin-bottom: 5px; text-align: center;">ניסיונות נותרים</div>
        <div class="life-container" id="lifePoints"></div>
    </div>
    <div style="display:flex; flex-direction:column;">
        <div class="error-container">
            <div id="errorMsg"></div>
        </div>
        <input type="text" id="cityInput" placeholder="הקלד שם יישוב..." list="cityList" autocomplete="off" onkeypress="if(event.key === 'Enter') makeGuess()">
        <datalist id="cityList"></datalist>
        <button id="submitBtn" class="btn-main" onclick="makeGuess()">ניחוש 🚀</button>
        <button id="giveUpBtn" class="btn-main btn-secondary" onclick="confirmGiveUp()">ויתור 🏳️</button>
    </div>
    <div id="feedback"></div>
</div>

<div id="map"></div>

<div id="victory-overlay" style="display:none;">
    <div class="modal">
        <h2 id="vic-title"></h2>
        <p id="vic-msg"></p>
        <p style="font-weight: bold; color: var(--primary);">האתגר מתחדש בכל יום! 🕒</p>
        <button class="btn-main" style="background: var(--dark);" onclick="hideOverlay()">חזרה למפה 🗺️</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
let allCities = [];
let target;
let attempts = 10;
let isGameOver = false;
let errorTimeout;

const map = L.map('map', { zoomControl: false }).setView([31.5, 34.8], 8);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png').addTo(map);

async function loadData() {
    try {
        const response = await fetch('MapIsrael.geojson');
        const data = await response.json();
        allCities = data.features.map(f => ({
            name: (f.properties["name:he"] || f.properties["name"] || "").trim(),
            lat: f.geometry.coordinates[1],
            lon: f.geometry.coordinates[0]
        })).filter(c => c.name !== "");
        setupUI();
        setDailyTarget();
    } catch (e) { console.error("Error loading data", e); }
}

function getLevenshteinDistance(a, b) {
    const matrix = [];
    for (let i = 0; i <= b.length; i++) matrix[i] = [i];
    for (let j = 0; j <= a.length; j++) matrix[0][j] = j;
    for (let i = 1; i <= b.length; i++) {
        for (let j = 1; j <= a.length; j++) {
            if (b.charAt(i - 1) === a.charAt(j - 1)) matrix[i][j] = matrix[i - 1][j - 1];
            else matrix[i][j] = Math.min(matrix[i - 1][j - 1] + 1, matrix[i][j - 1] + 1, matrix[i - 1][j] + 1);
        }
    }
    return matrix[b.length][a.length];
}

function makeGuess() {
    const input = document.getElementById('cityInput');
    const val = input.value.trim();
    const errorDiv = document.getElementById('errorMsg');
    
    if (!val || isGameOver) return;

    let guess = allCities.find(c => c.name === val);
    
    if (!guess) {
        clearTimeout(errorTimeout);
        input.classList.add('shake');
        setTimeout(() => input.classList.remove('shake'), 400);

        let bestMatch = null;
        for (let city of allCities) {
            let dist = getLevenshteinDistance(val, city.name);
            if (dist <= 2) { bestMatch = city.name; break; }
        }

        errorDiv.classList.add('visible');
        errorDiv.classList.remove('suggestion-active');

        if (bestMatch) {
            errorDiv.classList.add('suggestion-active');
            errorDiv.innerHTML = `האם התכוונת ל:<br><span class="suggestion-link" onclick="applySuggestion('${bestMatch}')">${bestMatch}?</span>`;
        } else {
            errorDiv.innerHTML = `היישוב לא מופיע במאגר ❌`;
            errorTimeout = setTimeout(() => { errorDiv.classList.remove('visible'); }, 4000);
        }
        return;
    }
    
    errorDiv.classList.remove('visible');
    processGuess(guess);
    input.value = "";
}

function applySuggestion(name) {
    const input = document.getElementById('cityInput');
    input.value = name;
    document.getElementById('errorMsg').classList.remove('visible');
    makeGuess();
}

function processGuess(guess) {
    attempts--;
    const lifeCircle = document.getElementById(`life-${attempts}`);
    if(lifeCircle) lifeCircle.classList.add('lost');

    const dist = calculateDistance(guess.lat, guess.lon, target.lat, target.lon);
    const bearing = (Math.atan2(target.lon - guess.lon, target.lat - guess.lat) * 180 / Math.PI + 360) % 360;
    const ratio = Math.pow(Math.min(dist / 150, 1), 0.35);
    const color = `rgb(255, ${Math.floor(255 * ratio)}, ${Math.floor(100 * ratio)})`;

    L.marker([guess.lat, guess.lon], {
        icon: L.divIcon({
            className: 'custom-marker',
            html: `<div class="marker-dot" style="background-color:${color}"></div><div class="marker-label">${guess.name}</div><div class="arrow-indicator" style="transform:rotate(${bearing}deg)">⬆️</div>`,
            iconSize: [0, 0]
        })
    }).addTo(map);
    
    const row = document.createElement('div');
    row.className = 'guess-row';
    row.style.background = color;
    row.innerHTML = `<span>${guess.name}</span> <span>${dist.toFixed(1)} ק"מ <span style="display:inline-block; transform:rotate(${bearing}deg)">⬆️</span></span>`;
    document.getElementById('feedback').prepend(row);

    if (window.innerWidth <= 850) toggleSidebar(false);
    map.flyTo([guess.lat, guess.lon], 11);

    if (guess.name === target.name) endGame(true);
    else if (attempts === 0) endGame(false);
}

function calculateDistance(lat1, lon1, lat2, lon2) {
    const R = 6371;
    const dLat = (lat2-lat1)*Math.PI/180;
    const dLon = (lon2-lon1)*Math.PI/180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function endGame(win) {
    isGameOver = true;
    document.getElementById('cityInput').disabled = true;
    document.getElementById('victory-overlay').style.display = 'flex';
    document.getElementById('vic-title').innerText = win ? "פגיעה בול! 🎯" : "אולי מחר... 🚩";
    document.getElementById('vic-msg').innerText = `היעד היה: ${target.name}`;
    L.marker([target.lat, target.lon]).addTo(map).bindPopup(`<b>${target.name}</b>`).openPopup();
    map.flyTo([target.lat, target.lon], 12);
}

function toggleSidebar(open) {
    const sb = document.getElementById('sidebar');
    if (open) sb.classList.add('open'); else sb.classList.remove('open');
}

function setupUI() {
    const container = document.getElementById('lifePoints');
    container.innerHTML = '';
    for(let i=0; i<10; i++) {
        const div = document.createElement('div');
        div.className = 'life-circle';
        div.id = `life-${i}`;
        container.appendChild(div);
    }
    const dl = document.getElementById('cityList');
    [...new Set(allCities.map(c => c.name))].sort().forEach(name => {
        let o = document.createElement('option'); o.value = name; dl.appendChild(o);
    });
}

function setDailyTarget() {
    const seedStr = new Date().toDateString();
    let hash = 0;
    for (let i = 0; i < seedStr.length; i++) hash = ((hash << 5) - hash) + seedStr.charCodeAt(i);
    const seededRandom = Math.abs(Math.sin(hash));
    target = allCities[Math.floor(seededRandom * allCities.length)];
}

function startGame() { document.getElementById('setup-overlay').style.display = 'none'; }
function toggleInstructions(show) { document.getElementById('how-to-play-overlay').style.display = show ? 'flex' : 'none'; }
function hideOverlay() { document.getElementById('victory-overlay').style.display = 'none'; }
function confirmGiveUp() { if(!isGameOver && confirm("האם אתה בטוח?")) endGame(false); }

window.onload = loadData;
</script>
</body>
</html>
